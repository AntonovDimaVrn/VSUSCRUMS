services:
  db:
    image: postgres:16-alpine
    container_name: scrummetrics-db
    environment:
      POSTGRES_DB: scrummetrics
      POSTGRES_USER: scrummetrics
      POSTGRES_PASSWORD: scrummetrics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrummetrics -d scrummetrics"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scrummetrics-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
