services:
  db:
    image: postgres:16-alpine
    container_name: scrums-db
    environment:
      POSTGRES_DB: scrums
      POSTGRES_USER: scrums
      POSTGRES_PASSWORD: scrums
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrums -d scrums"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scrums-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
